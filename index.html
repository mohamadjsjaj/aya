<!DOCTYPE html>
<html>
<head>
    <title>I Love You Aya</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            font-family: Arial, sans-serif;
            flex-direction: column;
            color: white;
        }

        .heart {
            position: relative;
            width: 150px;
            height: 150px;
            background: red;
            transform: rotate(-45deg);
            animation: beat 1s infinite;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 150px;
            height: 150px;
            background: red;
            border-radius: 50%;
        }

        .heart::before {
            top: -75px;
            left: 0;
        }

        .heart::after {
            left: 75px;
            top: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
            color: #ff4d6d;
        }

        @keyframes beat {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.2); }
        }
    </style>
</head>
<body>

<div class="heart"></div>
<h1>I love you Aya ??</h1>

</body>
</html>
